name: Release APKs

# 推送 v* 标签即编译两端 APK 并发布到对应 Release。
# 例：git tag v1.0.0 && git push origin v1.0.0
#
# 签名（可选但推荐，否则回退 debug 签名、用户升级需卸载重装）：
# 在仓库 Settings → Secrets and variables → Actions 配置：
#   ANDROID_KEYSTORE_BASE64   keystore 文件的 base64（base64 -i release.keystore | pbcopy）
#   ANDROID_KEYSTORE_PASSWORD store 口令
#   ANDROID_KEY_ALIAS         key 别名
#   ANDROID_KEY_PASSWORD      key 口令
# 生成 keystore：
#   keytool -genkeypair -v -keystore release.keystore -alias wanyingku \
#     -keyalg RSA -keysize 2048 -validity 10000

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Resolve version from tag
        run: echo "VER=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Decode keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build TV APK
        working-directory: tv
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease -PappVersionName="$VER" -PappVersionCode=${{ github.run_number }}

      - name: Build phone APK
        working-directory: app
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:assembleRelease -PappVersionName="$VER" -PappVersionCode=${{ github.run_number }}

      - name: Collect APKs (固定文件名，配合 latest 永久下载链)
        run: |
          mkdir -p dist
          cp tv/app/build/outputs/apk/release/app-release.apk dist/wanyingku-tv.apk
          cp app/composeApp/build/outputs/apk/release/composeApp-release.apk dist/wanyingku.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wanyingku-tv.apk
            dist/wanyingku.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
